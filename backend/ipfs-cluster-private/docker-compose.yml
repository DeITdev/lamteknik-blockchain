x-ipfs-private: &ipfs-private
  image: ipfs/kubo:release
  environment: &ipfs-private-env
    LIBP2P_FORCE_PNET: "1"

services:
  ##################################################################################
  ## Cluster PEER 0 ################################################################
  ##################################################################################

  ipfs0:
    <<: *ipfs-private
    container_name: ipfs0
    environment:
      <<: *ipfs-private-env
      PRIVATE_BOOTSTRAP_PEERS: >-
        /dns4/ipfs1/tcp/4001/p2p/12D3KooWDrAVhDt3YmY2ixyXnytU6G3UjnUcaemKdf6BPqDXtnkr
        /dns4/ipfs2/tcp/4001/p2p/12D3KooWPoCHwcdJqMZdFAtRH2r9ScPkuE5NxVo57EMV6eb2hxpk
        /dns4/ipfs3/tcp/4001/p2p/12D3KooWBY6oUxXr3Nrcs3EugCyfLuUdwEAJrUECjBkLAaxeaiNn
    ports:
      - "127.0.0.1:5001:5001" # ipfs api / webui
      - "127.0.0.1:8080:8080" # ipfs gateway
    volumes:
      - ./compose/ipfs0:/data/ipfs
      - ./swarm.key:/data/ipfs/swarm.key:ro
      - ./scripts/010-private-network.sh:/container-init.d/010-private-network.sh:ro
      - ./scripts/020-import-webui.sh:/container-init.d/020-import-webui.sh:ro
      - ./assets/webui-v4.12.0.car:/assets/webui-v4.12.0.car:ro

  cluster0:
    container_name: cluster0
    image: ipfs/ipfs-cluster:latest
    depends_on:
      - ipfs0
    environment:
      CLUSTER_PEERNAME: cluster0
      CLUSTER_SECRET: ${CLUSTER_SECRET}
      CLUSTER_IPFSHTTP_NODEMULTIADDRESS: /dns4/ipfs0/tcp/5001
      CLUSTER_CRDT_TRUSTEDPEERS: "*"
      CLUSTER_RESTAPI_HTTPLISTENMULTIADDRESS: /ip4/0.0.0.0/tcp/9094
      CLUSTER_MONITORPINGINTERVAL: 2s
    ports:
      - "127.0.0.1:9094:9094"
      - "9095:9095"
      - "9096:9096"
    volumes:
      - ./compose/cluster0:/data/ipfs-cluster

  ##################################################################################
  ## Cluster PEER 1 ################################################################
  ##################################################################################

  ipfs1:
    <<: *ipfs-private
    container_name: ipfs1
    environment:
      <<: *ipfs-private-env
      PRIVATE_BOOTSTRAP_PEERS: >-
        /dns4/ipfs0/tcp/4001/p2p/12D3KooWSSy7KoEW3Xa8WakzhXnfFxfBhrrxXwjfgog6qRHUDDZ8
        /dns4/ipfs2/tcp/4001/p2p/12D3KooWPoCHwcdJqMZdFAtRH2r9ScPkuE5NxVo57EMV6eb2hxpk
        /dns4/ipfs3/tcp/4001/p2p/12D3KooWBY6oUxXr3Nrcs3EugCyfLuUdwEAJrUECjBkLAaxeaiNn
    volumes:
      - ./compose/ipfs1:/data/ipfs
      - ./swarm.key:/data/ipfs/swarm.key:ro
      - ./scripts/010-private-network.sh:/container-init.d/010-private-network.sh:ro

  cluster1:
    container_name: cluster1
    image: ipfs/ipfs-cluster:latest
    depends_on:
      - ipfs1
      - cluster0
    command:
      - daemon
      - --bootstrap
      - /dns4/cluster0/tcp/9096/p2p/12D3KooWQkijxCKUnEg6hP9ZwiBZ17AyWoZxDU8Y8seCKimvgJm6
    environment:
      CLUSTER_PEERNAME: cluster1
      CLUSTER_SECRET: ${CLUSTER_SECRET}
      CLUSTER_IPFSHTTP_NODEMULTIADDRESS: /dns4/ipfs1/tcp/5001
      CLUSTER_CRDT_TRUSTEDPEERS: "*"
      CLUSTER_MONITORPINGINTERVAL: 2s
    volumes:
      - ./compose/cluster1:/data/ipfs-cluster

  ##################################################################################
  ## Cluster PEER 2 ################################################################
  ##################################################################################

  ipfs2:
    <<: *ipfs-private
    container_name: ipfs2
    environment:
      <<: *ipfs-private-env
      PRIVATE_BOOTSTRAP_PEERS: >-
        /dns4/ipfs0/tcp/4001/p2p/12D3KooWSSy7KoEW3Xa8WakzhXnfFxfBhrrxXwjfgog6qRHUDDZ8
        /dns4/ipfs1/tcp/4001/p2p/12D3KooWDrAVhDt3YmY2ixyXnytU6G3UjnUcaemKdf6BPqDXtnkr
        /dns4/ipfs3/tcp/4001/p2p/12D3KooWBY6oUxXr3Nrcs3EugCyfLuUdwEAJrUECjBkLAaxeaiNn
    volumes:
      - ./compose/ipfs2:/data/ipfs
      - ./swarm.key:/data/ipfs/swarm.key:ro
      - ./scripts/010-private-network.sh:/container-init.d/010-private-network.sh:ro

  cluster2:
    container_name: cluster2
    image: ipfs/ipfs-cluster:latest
    depends_on:
      - ipfs2
      - cluster0
    command:
      - daemon
      - --bootstrap
      - /dns4/cluster0/tcp/9096/p2p/12D3KooWQkijxCKUnEg6hP9ZwiBZ17AyWoZxDU8Y8seCKimvgJm6
    environment:
      CLUSTER_PEERNAME: cluster2
      CLUSTER_SECRET: ${CLUSTER_SECRET}
      CLUSTER_IPFSHTTP_NODEMULTIADDRESS: /dns4/ipfs2/tcp/5001
      CLUSTER_CRDT_TRUSTEDPEERS: "*"
      CLUSTER_MONITORPINGINTERVAL: 2s
    volumes:
      - ./compose/cluster2:/data/ipfs-cluster

  ##################################################################################
  ## Cluster PEER 3 ################################################################
  ##################################################################################

  ipfs3:
    <<: *ipfs-private
    container_name: ipfs3
    environment:
      <<: *ipfs-private-env
      PRIVATE_BOOTSTRAP_PEERS: >-
        /dns4/ipfs0/tcp/4001/p2p/12D3KooWSSy7KoEW3Xa8WakzhXnfFxfBhrrxXwjfgog6qRHUDDZ8
        /dns4/ipfs1/tcp/4001/p2p/12D3KooWDrAVhDt3YmY2ixyXnytU6G3UjnUcaemKdf6BPqDXtnkr
        /dns4/ipfs2/tcp/4001/p2p/12D3KooWPoCHwcdJqMZdFAtRH2r9ScPkuE5NxVo57EMV6eb2hxpk
    volumes:
      - ./compose/ipfs3:/data/ipfs
      - ./swarm.key:/data/ipfs/swarm.key:ro
      - ./scripts/010-private-network.sh:/container-init.d/010-private-network.sh:ro

  cluster3:
    container_name: cluster3
    image: ipfs/ipfs-cluster:latest
    depends_on:
      - ipfs3
      - cluster0
    command:
      - daemon
      - --bootstrap
      - /dns4/cluster0/tcp/9096/p2p/12D3KooWQkijxCKUnEg6hP9ZwiBZ17AyWoZxDU8Y8seCKimvgJm6
    environment:
      CLUSTER_PEERNAME: cluster3
      CLUSTER_SECRET: ${CLUSTER_SECRET}
      CLUSTER_IPFSHTTP_NODEMULTIADDRESS: /dns4/ipfs3/tcp/5001
      CLUSTER_CRDT_TRUSTEDPEERS: "*"
      CLUSTER_MONITORPINGINTERVAL: 2s
    volumes:
      - ./compose/cluster3:/data/ipfs-cluster
